<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHANTOM — Shadow Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black:     #08090a;
    --ink:       #0f1013;
    --surface:   #141619;
    --border:    #1e2126;
    --border2:   #2a2f38;
    --muted:     #3a404d;
    --dim:       #6b7280;
    --text:      #e8eaed;
    --bright:    #f8f9fa;
    --gold:      #c9a84c;
    --gold2:     #e8c96d;
    --red:       #e05252;
    --green:     #4caf82;
    --blue:      #4a9eff;
    --tier-a:    #c9a84c;
    --tier-b:    #6b9fff;
    --tier-c:    #6b7280;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 14px; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .masthead {
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(8,9,10,0.95);
    backdrop-filter: blur(12px);
  }

  .masthead-left { display: flex; align-items: center; gap: 1.5rem; }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--bright);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .logo span { color: var(--gold); }

  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-left: 1px solid var(--border2);
    padding-left: 1.5rem;
  }

  .masthead-right { display: flex; align-items: center; gap: 1.5rem; }

  .pulse-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
    box-shadow: 0 0 8px var(--green);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .status-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--green);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .last-updated {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 0.05em;
  }

  .nav-strip {
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    background: var(--ink);
  }

  .nav-tab {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--dim);
    padding: 0.75rem 1.25rem;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  .ticker-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.5rem 2rem;
    display: flex;
    align-items: center;
    gap: 2rem;
    overflow: hidden;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
  }

  .ticker-label {
    color: var(--dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .ticker-items {
    display: flex;
    gap: 2rem;
    animation: ticker 40s linear infinite;
    white-space: nowrap;
  }

  @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

  .ticker-item { display: flex; gap: 0.5rem; align-items: center; }
  .ticker-name { color: var(--text); font-weight: 500; }
  .ticker-val { color: var(--dim); }
  .ticker-pos { color: var(--green); }
  .ticker-sep { color: var(--border2); }

  .main { padding: 2rem; position: relative; z-index: 1; }

  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 1.25rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--bright);
    letter-spacing: 0.02em;
  }

  .section-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .stat-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 2rem;
  }

  .stat-cell {
    background: var(--surface);
    padding: 1.25rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--dim);
  }

  .stat-value {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--bright);
    line-height: 1;
  }

  .stat-value.gold { color: var(--gold); }
  .stat-value.green { color: var(--green); }
  .stat-value.blue { color: var(--blue); }
  .stat-sub { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); }

  .entity-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 2rem;
  }

  .entity-card {
    background: var(--surface);
    padding: 1.25rem 1.5rem;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
    overflow: hidden;
  }

  .entity-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--border2);
    transition: background 0.2s;
  }

  .entity-card:hover { background: var(--ink); }
  .entity-card:hover::before { background: var(--gold); }
  .entity-card.tier-a::before { background: var(--gold); opacity: 0.6; }
  .entity-card.tier-b::before { background: var(--blue); opacity: 0.6; }
  .entity-card.tier-c::before { background: var(--muted); opacity: 0.6; }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 0.75rem;
  }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--bright);
    line-height: 1.2;
  }

  .card-type {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--dim);
    margin-top: 0.2rem;
  }

  .tier-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    padding: 0.2rem 0.5rem;
    border: 1px solid;
    text-transform: uppercase;
  }

  .tier-badge.a { color: var(--gold); border-color: var(--gold); opacity: 0.8; }
  .tier-badge.b { color: var(--blue); border-color: var(--blue); opacity: 0.8; }
  .tier-badge.c { color: var(--dim); border-color: var(--dim); opacity: 0.8; }

  .card-filings { display: flex; flex-direction: column; gap: 0.4rem; }

  .filing-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.4rem 0;
    border-bottom: 1px solid var(--border);
  }
  .filing-row:last-child { border-bottom: none; }

  .filing-form {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--gold2);
    letter-spacing: 0.05em;
    font-weight: 500;
  }

  .filing-date { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--dim); }

  .filing-link {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    color: var(--blue);
    text-decoration: none;
    letter-spacing: 0.05em;
    opacity: 0.7;
    transition: opacity 0.15s;
  }
  .filing-link:hover { opacity: 1; }

  .holdings-section {
    margin-top: 0.75rem;
    border-top: 1px solid var(--border);
    padding-top: 0.75rem;
  }

  .holdings-header {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    color: var(--dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    display: flex;
    justify-content: space-between;
  }

  .holdings-aum {
    color: var(--gold);
    font-weight: 500;
  }

  .holding-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.3rem 0;
    border-bottom: 1px solid var(--border);
  }
  .holding-row:last-child { border-bottom: none; }

  .holding-name {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 65%;
  }

  .holding-value {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--gold);
    flex-shrink: 0;
  }

  .holding-bar-wrap {
    width: 40px;
    height: 3px;
    background: var(--border2);
    margin: 0 0.5rem;
    flex-shrink: 0;
  }

  .holding-bar {
    height: 100%;
    background: var(--gold);
    opacity: 0.5;
  }

  .card-footer {
    margin-top: 0.75rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .filing-count { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); }

  .signal-type {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.15rem 0.4rem;
    background: rgba(201,168,76,0.08);
    color: var(--gold);
    border: 1px solid rgba(201,168,76,0.2);
  }

  .signal-type.form4 {
    background: rgba(74,158,255,0.08);
    color: var(--blue);
    border-color: rgba(74,158,255,0.2);
  }

  .gap-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  .gap-cell {
    background: var(--surface);
    padding: 1rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .gap-name {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text);
    font-weight: 500;
  }

  .gap-status {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .gap-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .gap-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .gap-dot.stub { background: var(--gold); }
  .gap-dot.dead { background: var(--red); }

  .gap-note { font-family: 'DM Mono', monospace; font-size: 0.58rem; color: var(--muted); }

  .state-msg {
    text-align: center;
    padding: 4rem 2rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .state-msg .big {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--muted);
    display: block;
    margin-bottom: 0.5rem;
    font-weight: 400;
    letter-spacing: 0.02em;
    text-transform: none;
  }

  .section-gap { margin-top: 2.5rem; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--black); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .fade-in { animation: fadeIn 0.4s ease forwards; opacity: 0; }
  @keyframes fadeIn { to { opacity: 1; } }
  .stagger-1 { animation-delay: 0.05s; }
  .stagger-2 { animation-delay: 0.1s; }
  .stagger-3 { animation-delay: 0.15s; }
</style>
</head>
<body>

<header class="masthead">
  <div class="masthead-left">
    <div class="logo">PH<span>▲</span>NTOM</div>
    <div class="tagline">Shadow Intelligence Platform</div>
  </div>
  <div class="masthead-right">
    <div class="pulse-dot"></div>
    <div class="status-text">Live</div>
    <div class="last-updated" id="lastUpdated">Loading...</div>
  </div>
</header>

<nav class="nav-strip">
  <button class="nav-tab active" onclick="setView('command')">Command</button>
  <button class="nav-tab" onclick="setView('entities')">Entities</button>
  <button class="nav-tab" onclick="setView('holdings')">Holdings</button>
  <button class="nav-tab" onclick="setView('analysis')">Analysis</button>
  <button class="nav-tab" onclick="setView('gaps')">Signal Gaps</button>
</nav>

<div class="ticker-bar">
  <span class="ticker-label">Monitored</span>
  <div class="ticker-items" id="tickerItems">
    <span class="ticker-item"><span class="ticker-name">Loading...</span></span>
  </div>
</div>

<main class="main" id="mainContent">
  <div class="state-msg"><span class="big">Initializing</span>Pulling signal data...</div>
</main>

<script>
const DATA_URL = 'https://raw.githubusercontent.com/anulakhera-max/phantom/main/data/signals/form4.json';
const POSITIONS_URL = 'https://raw.githubusercontent.com/anulakhera-max/phantom/main/data/signals/positions.json';
const ANALYSIS_URL = 'https://raw.githubusercontent.com/anulakhera-max/phantom/main/data/signals/analysis.json';
let currentView = 'command';
let signalData = null;
let positionData = null;
let analysisData = null;
async function init() {
  try {
    const [sigRes, posRes, anaRes] = await Promise.all([
  fetch(DATA_URL + '?t=' + Date.now()),
  fetch(POSITIONS_URL + '?t=' + Date.now()),
  fetch(ANALYSIS_URL + '?t=' + Date.now())
]);
signalData = await sigRes.json();
positionData = await posRes.json();
analysisData = await anaRes.json();
    updateMasthead();
    buildTicker();
    render();
  } catch (err) {
    document.getElementById('mainContent').innerHTML =
      `<div class="state-msg"><span class="big">No Signal</span>Could not reach data source. Agent may be initializing.</div>`;
  }
}

function updateMasthead() {
  const d = new Date(signalData.meta.collected_at);
  const fmt = d.toLocaleString('en-US', {
    month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit',
    timeZone: 'America/Toronto'
  });
  document.getElementById('lastUpdated').textContent = fmt + ' EST';
}

function buildTicker() {
  const items = signalData.signals.map(s => {
    const pos = positionData?.positions?.find(p => p.entity_id === s.entity_id);
    const aum = pos ? ` · $${pos.total_value_b.toLocaleString()}B` : '';
    return `<span class="ticker-item">
      <span class="ticker-name">${s.entity_name}</span>
      <span class="ticker-val">${s.type.toUpperCase()}</span>
      <span class="ticker-pos">${s.filings.length} filing${s.filings.length !== 1 ? 's' : ''}${aum}</span>
      <span class="ticker-sep">·</span>
    </span>`;
  }).join('');
  document.getElementById('tickerItems').innerHTML = items + items;
}

function setView(view) {
  currentView = view;
  document.querySelectorAll('.nav-tab').forEach((t, i) => {
    t.classList.toggle('active', ['command','entities','holdings','analysis','gaps'][i] === view)
  });
  render();
}

function render() {
  if (!signalData) return;
  if (currentView === 'command') renderCommand();
  else if (currentView === 'entities') renderEntities();
  else if (currentView === 'holdings') renderHoldings();
  else if (currentView === 'analysis') renderAnalysis();
  else renderGaps();
}

function renderCommand() {
  const { meta, signals } = signalData;
  const totalFilings = signals.reduce((a, s) => a + s.filings.length, 0);
  const totalAum = positionData ? positionData.meta.total_aum_tracked_b : 0;
  const totalPositions = positionData ? positionData.positions.reduce((a, p) => a + p.total_positions, 0) : 0;
  const newest = signals.reduce((a, s) => {
    const d = s.filings[0]?.date || '';
    return d > a.date ? { name: s.entity_name, date: d } : a;
  }, { name: '—', date: '' });

  document.getElementById('mainContent').innerHTML = `
    <div class="fade-in stagger-1">
      <div class="section-header">
        <div class="section-title">Command Center</div>
        <div class="section-meta">EDGAR · Form 4 · 13F-HR · Real-time</div>
      </div>
      <div class="stat-row">
        <div class="stat-cell">
          <div class="stat-label">Entities Tracked</div>
          <div class="stat-value gold">${meta.entity_count}</div>
          <div class="stat-sub">Across all tiers</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Active Signals</div>
          <div class="stat-value green">${meta.signal_count}</div>
          <div class="stat-sub">This cycle</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Total Positions</div>
          <div class="stat-value">${totalPositions.toLocaleString()}</div>
          <div class="stat-sub">Parsed from 13F filings</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">AUM Tracked</div>
          <div class="stat-value blue" style="font-size:1.4rem">$${Math.round(totalAum/1000)}T</div>
          <div class="stat-sub">Institutional capital</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Most Recent</div>
          <div class="stat-value" style="font-size:1rem;padding-top:0.3rem">${newest.name}</div>
          <div class="stat-sub">${newest.date}</div>
        </div>
      </div>
    </div>

    <div class="section-gap fade-in stagger-2">
      <div class="section-header">
        <div class="section-title">Latest Filings</div>
        <div class="section-meta">SEC EDGAR · Live pull · ${new Date(meta.collected_at).toLocaleDateString()}</div>
      </div>
      ${renderEntityCards(signals.slice(0, 6))}
    </div>

    <div class="section-gap fade-in stagger-3">
      <div class="section-header">
        <div class="section-title">Individual Actors</div>
        <div class="section-meta">Form 4 insider transactions</div>
      </div>
      ${renderEntityCards(signals.filter(s => s.type === 'form4'))}
    </div>
  `;
}

function renderEntities() {
  const { signals, meta } = signalData;
  document.getElementById('mainContent').innerHTML = `
    <div class="fade-in stagger-1">
      <div class="section-header">
        <div class="section-title">Entity Intelligence</div>
        <div class="section-meta">${signals.length} entities · ${meta.signal_count} signals active</div>
      </div>
      ${renderEntityCards(signals)}
    </div>
  `;
}

function renderEntityCards(signals) {
  if (!signals.length) return `<div class="state-msg"><span class="big">No Signals</span>No data for this filter.</div>`;
  return `<div class="entity-grid">
    ${signals.map(s => {
      const pos = positionData?.positions?.find(p => p.entity_id === s.entity_id);
      const maxVal = pos?.top_10?.[0]?.value_usd || 1;

      const holdingsHtml = pos ? `
        <div class="holdings-section">
          <div class="holdings-header">
            <span>Top Holdings · ${pos.total_positions.toLocaleString()} positions</span>
            <span class="holdings-aum">$${pos.total_value_b.toLocaleString()}B AUM</span>
          </div>
          ${pos.top_10.slice(0, 5).map(h => `
            <div class="holding-row">
              <div class="holding-name">${h.name}</div>
              <div class="holding-bar-wrap">
                <div class="holding-bar" style="width:${Math.round((h.value_usd/maxVal)*100)}%"></div>
              </div>
              <div class="holding-value">$${(h.value_usd/1e9).toFixed(1)}B</div>
            </div>
          `).join('')}
        </div>
      ` : '';

      return `
        <div class="entity-card tier-${s.tier.toLowerCase()}">
          <div class="card-top">
            <div>
              <div class="card-name">${s.entity_name}</div>
              <div class="card-type">${entityTypeLabel(s.entity_id)}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.4rem">
              <div class="tier-badge ${s.tier.toLowerCase()}">Tier ${s.tier}</div>
              <div class="signal-type ${s.type === 'form4' ? 'form4' : ''}">${s.type.toUpperCase()}</div>
            </div>
          </div>
          <div class="card-filings">
            ${s.filings.slice(0, 3).map(f => `
              <div class="filing-row">
                <div class="filing-form">${f.form}</div>
                <div class="filing-date">${f.date}</div>
                <a class="filing-link" href="${f.url}" target="_blank">↗ SEC</a>
              </div>
            `).join('')}
          </div>
          ${holdingsHtml}
          <div class="card-footer">
            <div class="filing-count">${s.filings.length} filing${s.filings.length !== 1 ? 's' : ''} · ${s.collected_at.slice(0,10)}</div>
          </div>
        </div>
      `;
    }).join('')}
  </div>`;
}

function renderHoldings() {
  if (!positionData) {
    document.getElementById('mainContent').innerHTML =
      `<div class="state-msg"><span class="big">No Position Data</span>Run filing-reader agent first.</div>`;
    return;
  }

  const sorted = [...positionData.positions].sort((a, b) => b.total_value_b - a.total_value_b);

  document.getElementById('mainContent').innerHTML = `
    <div class="fade-in stagger-1">
      <div class="section-header">
        <div class="section-title">Position Intelligence</div>
        <div class="section-meta">$${Math.round(positionData.meta.total_aum_tracked_b/1000)}T AUM · ${positionData.meta.entities_successful} entities · ${positionData.positions.reduce((a,p)=>a+p.total_positions,0).toLocaleString()} total positions</div>
      </div>
      ${sorted.map(entity => `
        <div style="margin-bottom:1px;background:var(--surface);border:1px solid var(--border);margin-bottom:1rem">
          <div style="padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--bright)">${entity.entity_name}</div>
              <div style="font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--dim);margin-top:0.2rem">${entity.total_positions.toLocaleString()} positions · Filed ${entity.filing_url.split('/').slice(-2,-1)[0]}</div>
            </div>
            <div style="text-align:right">
              <div style="font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--gold)">$${entity.total_value_b.toLocaleString()}B</div>
              <div style="font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--dim)">Reported AUM</div>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1px;background:var(--border)">
            ${entity.top_10.slice(0,10).map((h, i) => {
              const pct = ((h.value_usd / entity.total_value_usd) * 100).toFixed(1);
              return `
                <div style="background:var(--ink);padding:0.75rem 1rem">
                  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.3rem">
                    <div style="font-family:'DM Mono',monospace;font-size:0.58rem;color:var(--dim)">#${i+1}</div>
                    <div style="font-family:'DM Mono',monospace;font-size:0.58rem;color:var(--muted)">${pct}%</div>
                  </div>
                  <div style="font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:0.3rem">${h.name}</div>
                  <div style="font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--gold);font-weight:500">$${(h.value_usd/1e9).toFixed(2)}B</div>
                  <div style="margin-top:0.4rem;height:2px;background:var(--border2)">
                    <div style="height:100%;background:var(--gold);opacity:0.6;width:${pct}%"></div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `).join('')}
    </div>
  `;
}
function renderAnalysis() {
  if (!analysisData) {
    document.getElementById('mainContent').innerHTML =
      `<div class="state-msg"><span class="big">No Analysis</span>Run analyzer agent first.</div>`;
    return;
  }
  document.getElementById('mainContent').innerHTML = `
    <div class="fade-in stagger-1">
      <div class="section-header">
        <div class="section-title">Intelligence Analysis</div>
        <div class="section-meta">Claude · ${analysisData.meta.entity_count} entities · ${new Date(analysisData.meta.analyzed_at).toLocaleDateString()}</div>
      </div>
      ${analysisData.analyses.map(a => `
        <div style="margin-bottom:1rem;background:var(--surface);border:1px solid var(--border)">
          <div style="padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
            <div style="font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--bright)">${a.entity_name}</div>
            <div style="font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--dim)">$${a.aum_b.toLocaleString()}B · ${a.total_positions.toLocaleString()} positions</div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border)">
            <div style="background:var(--ink);padding:1.25rem">
              <div style="font-family:'DM Mono',monospace;font-size:0.58rem;color:var(--gold);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:0.6rem">The Position</div>
              <div style="font-family:'DM Sans',sans-serif;font-size:0.78rem;color:var(--text);line-height:1.6">${a.analysis.the_position || '—'}</div>
            </div>
            <div style="background:var(--ink);padding:1.25rem">
              <div style="font-family:'DM Mono',monospace;font-size:0.58rem;color:var(--blue);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:0.6rem">The Thesis</div>
              <div style="font-family:'DM Sans',sans-serif;font-size:0.78rem;color:var(--text);line-height:1.6">${a.analysis.the_thesis || '—'}</div>
            </div>
            <div style="background:var(--ink);padding:1.25rem">
              <div style="font-family:'DM Mono',monospace;font-size:0.58rem;color:var(--green);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:0.6rem">The Signal</div>
              <div style="font-family:'DM Sans',sans-serif;font-size:0.78rem;color:var(--text);line-height:1.6">${a.analysis.the_signal || '—'}</div>
            </div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}
